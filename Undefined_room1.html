<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성질 전이 퍼즐 - 1인칭 손 모델링 적용</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
            background-color: rgba(255, 255, 255, 0.9); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 100;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        #hud {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 40px; font-family: 'Malgun Gothic', sans-serif; color: white;
            background: rgba(30, 30, 35, 0.85); padding: 15px 40px; border-radius: 12px; 
            z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #444;
        }
        .hand-status { text-align: center; }
        .hand-title { font-size: 13px; color: #a0a0ab; margin-bottom: 8px; letter-spacing: 1px; }
        .hand-prop { font-size: 22px; font-weight: bold; color: #4ade80; }

        #stance-ui {
            position: absolute; top: 25px; right: 25px;
            color: white; font-family: 'Malgun Gothic', sans-serif; font-size: 16px; font-weight: bold;
            background: rgba(30, 30, 35, 0.85); padding: 10px 20px; border-radius: 8px; 
            z-index: 100; border: 1px solid #444;
        }

        #notification {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            color: #fff; font-family: 'Malgun Gothic', sans-serif; font-size: 16px; font-weight: bold;
            background: rgba(239, 68, 68, 0.9); padding: 12px 25px; border-radius: 8px;
            display: none; z-index: 100; text-align: center; white-space: pre-wrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #blocker {
            position: absolute; width: 100%; height: 100%; background-color: rgba(20,20,25,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; font-family: 'Malgun Gothic', sans-serif; z-index: 200; cursor: pointer;
        }
        .guide-text { color: #aaa; font-size: 15px; margin-top: 25px; text-align: center; line-height: 1.8; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px;}
        .guide-highlight { color: #4ade80; font-weight: bold; }

        #keypad-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #222; padding: 25px; border-radius: 12px; border: 2px solid #555;
            display: none; z-index: 300; text-align: center; font-family: 'Malgun Gothic', sans-serif;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #keypad-display {
            width: 200px; height: 50px; background: #111; color: #4ade80; font-size: 24px;
            line-height: 50px; margin: 0 auto 20px auto; border-radius: 5px; letter-spacing: 5px; border: 1px solid #333;
        }
        .keypad-grid {
            display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; justify-content: center;
        }
        .key-btn {
            width: 60px; height: 60px; font-size: 24px; font-weight: bold; background: #444; color: white;
            border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s;
        }
        .key-btn:hover { background: #666; }
        .key-close {
            position: absolute; top: 10px; right: 15px; background: none; border: none; color: #aaa;
            font-size: 18px; cursor: pointer; font-weight: bold;
        }
        .key-close:hover { color: #fff; }

        #success-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 500; font-family: 'Malgun Gothic', sans-serif; color: #111;
        }
        #success-ui h1 { font-size: 56px; margin-bottom: 40px; font-weight: 900; }
        #retry-btn {
            padding: 15px 50px; font-size: 22px; background: #222; color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.2s;
        }
        #retry-btn:hover { background: #444; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="stance-ui">자세: 서있기</div>
    <div id="notification">알림 메시지</div>
    
    <div id="hud">
        <div class="hand-status">
            <div class="hand-title">왼손 (좌클릭)</div>
            <div id="left-hand" class="hand-prop">비어있음</div>
        </div>
        <div class="hand-status">
            <div class="hand-title">오른손 (우클릭)</div>
            <div id="right-hand" class="hand-prop">비어있음</div>
        </div>
    </div>

    <div id="keypad-ui">
        <button class="key-close" onclick="closeKeypad()">X</button>
        <div id="keypad-display"></div>
        <div class="keypad-grid">
            <button class="key-btn" onclick="inputKey(1)">1</button>
            <button class="key-btn" onclick="inputKey(2)">2</button>
            <button class="key-btn" onclick="inputKey(3)">3</button>
            <button class="key-btn" onclick="inputKey(4)">4</button>
            <button class="key-btn" onclick="inputKey(5)">5</button>
            <button class="key-btn" onclick="inputKey(6)">6</button>
            <button class="key-btn" onclick="inputKey(7)">7</button>
            <button class="key-btn" onclick="inputKey(8)">8</button>
            <button class="key-btn" onclick="inputKey(9)">9</button>
            <div></div>
            <button class="key-btn" onclick="inputKey(0)">0</button>
            <div></div>
        </div>
    </div>

    <div id="success-ui">
        <h1>탈출 성공</h1>
        <button id="retry-btn" onclick="location.reload()">다시하기</button>
    </div>

    <div id="blocker">
        <h1 style="font-size: 32px; margin-bottom: 10px;">[첫 번째 방] 성질 전이 퍼즐</h1>
        <p style="color: #ccc;">화면을 클릭하여 게임에 진 진입하세요</p>
        <div class="guide-text">
            <span class="guide-highlight">이동:</span> WASD &nbsp;|&nbsp; <span class="guide-highlight">달리기:</span> LShift &nbsp;|&nbsp; <span class="guide-highlight">점프:</span> Space<br>
            <span class="guide-highlight">추출/주입:</span> 좌/우 클릭 &nbsp;|&nbsp; <span class="guide-highlight">집기/놓기:</span> E &nbsp;|&nbsp; <span class="guide-highlight">던지기:</span> 물건 든 상태로 F<br>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let camera, scene, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        let isRunning = false;
        let stance = 'stand'; 
        let targetCameraHeight = 1.6;
        let canJump = true;
        const gravity = 30.0;

        const raycaster = new THREE.Raycaster();
        const downRaycaster = new THREE.Raycaster(); 
        const screenCenter = new THREE.Vector2(0, 0);
        const interactDistance = 4; 
        const interactableObjects = []; 
        const walkableObjects = []; 

        let leftHandProperty = null;  
        let rightHandProperty = null; 
        let heldObject = null; 
        const thrownObjects = [];

        let leftHandMesh, rightHandMesh;
        const handRestZ = -0.8; 

        let paperBox, windowMesh, seesawPad, seesawBoard, safeBox, exitDoor;

        let currentInput = "";
        let isDoorOpen = false;
        const roomBound = 9.5; 

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x2c303a); 
            scene.fog = new THREE.Fog(0x2c303a, 10, 30); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            scene.add(camera); 

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); 
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xfff5e6, 0.8); 
            dirLight.position.set(-10, 15, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            controls = new THREE.PointerLockControls(camera, document.body);
            controls.getObject().position.set(0, targetCameraHeight, 0); 
            
            const handGeo = new THREE.BoxGeometry(0.12, 0.12, 0.4);
            leftHandMesh = new THREE.Mesh(handGeo, new THREE.MeshStandardMaterial({ color: 0x555555, transparent: true, opacity: 0.3 }));
            leftHandMesh.position.set(-0.35, -0.3, handRestZ);
            leftHandMesh.rotation.y = Math.PI / 8;
            camera.add(leftHandMesh); 

            rightHandMesh = new THREE.Mesh(handGeo, new THREE.MeshStandardMaterial({ color: 0x555555, transparent: true, opacity: 0.3 }));
            rightHandMesh.position.set(0.35, -0.3, handRestZ);
            rightHandMesh.rotation.y = -Math.PI / 8;
            camera.add(rightHandMesh);

            const blocker = document.getElementById('blocker');
            blocker.addEventListener('click', () => { 
                if(document.getElementById('keypad-ui').style.display !== 'block') controls.lock(); 
            });
            controls.addEventListener('lock', () => { blocker.style.display = 'none'; });
            controls.addEventListener('unlock', () => { 
                if(document.getElementById('keypad-ui').style.display !== 'block' && document.getElementById('success-ui').style.display !== 'flex') {
                    blocker.style.display = 'flex'; 
                }
            });

            document.addEventListener('contextmenu', event => event.preventDefault());

            const onKeyDown = function (event) {
                switch (event.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'ShiftLeft': isRunning = true; break; 
                    case 'KeyC': setStance('crouch'); break;   
                    case 'ControlLeft': setStance('prone'); break; 
                    case 'Space': if (canJump) { velocity.y += 10.0; canJump = false; } break;
                    case 'KeyE': handleEKey(); break; 
                    case 'KeyF': handleFKey(); break; 
                }
            };
            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                    case 'ShiftLeft': isRunning = false; break;
                    case 'KeyC': 
                    case 'ControlLeft': setStance('stand'); break;
                }
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousedown', onMouseClick);

            function createStylizedMesh(geometry, color, isTransparent=false, opacity=1.0) {
                const material = new THREE.MeshStandardMaterial({ 
                    color: color, transparent: isTransparent, opacity: opacity,
                    roughness: 0.8, metalness: 0.1 
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x111111, linewidth: 2 }));
                mesh.add(line);
                return mesh;
            }

            const wallMaterial = new THREE.MeshStandardMaterial({ color: 0xd0d4dc, roughness: 0.9 });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({ color: 0x9ca3af, roughness: 0.8 }));
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);
            walkableObjects.push(floor);

            const wall1 = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 0.5), wallMaterial);
            wall1.position.set(0, 5, -10);
            wall1.receiveShadow = true;
            scene.add(wall1);

            const wall2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 10, 20), wallMaterial);
            wall2.position.set(10, 5, 0);
            wall2.receiveShadow = true;
            scene.add(wall2);

            exitDoor = createStylizedMesh(new THREE.BoxGeometry(2.5, 4, 0.2), 0x785640);
            exitDoor.position.set(0, 2.0, -9.7);
            exitDoor.userData = { name: '출구문', isDoor: true, canHold: false };
            scene.add(exitDoor);
            interactableObjects.push(exitDoor);

            safeBox = createStylizedMesh(new THREE.BoxGeometry(1.8, 2.2, 1.8), 0x5a636e);
            safeBox.position.set(-5, 1.1, -5);
            safeBox.userData = { name: '금고', originalStaticProperty: '무거움', staticProperty: '무거움', canHold: false };
            scene.add(safeBox);
            interactableObjects.push(safeBox);
            walkableObjects.push(safeBox);

            const noteCanvas = document.createElement('canvas');
            noteCanvas.width = 256;
            noteCanvas.height = 256;
            const ctx = noteCanvas.getContext('2d');
            ctx.fillStyle = '#fef08a'; 
            ctx.fillRect(0, 0, 256, 256);
            ctx.fillStyle = '#111111'; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 45px "Malgun Gothic", sans-serif';
            ctx.fillText('PASSWORD', 128, 70);
            ctx.font = 'bold 85px "Malgun Gothic", sans-serif';
            ctx.fillText('1234', 128, 150);

            const noteTexture = new THREE.CanvasTexture(noteCanvas);
            const passwordNote = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.8), new THREE.MeshBasicMaterial({ map: noteTexture }));
            passwordNote.position.set(-5, 1.1, -4.3); 
            scene.add(passwordNote);

            paperBox = createStylizedMesh(new THREE.BoxGeometry(1, 1, 1), 0xcfa87e);
            paperBox.position.set(-3, 0.5, 2);
            paperBox.userData = { name: '종이박스', originalStaticProperty: '가벼움', staticProperty: '가벼움', canHold: true };
            scene.add(paperBox);
            interactableObjects.push(paperBox);

            seesawPad = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 1.5), new THREE.MeshBasicMaterial({ color: 0xfacc15, wireframe: true }));
            seesawPad.rotation.x = -Math.PI / 2;
            seesawPad.position.set(8, 0.02, -2);
            scene.add(seesawPad);

            const fulcrum = createStylizedMesh(new THREE.ConeGeometry(0.8, 1.5, 4), 0x7f1d1d);
            fulcrum.position.set(8, 0.75, 2);
            scene.add(fulcrum);

            seesawBoard = createStylizedMesh(new THREE.BoxGeometry(1.4, 0.2, 8), 0xcd5c5c);
            seesawBoard.position.set(8, 1.5, 2); 
            seesawBoard.rotation.x = Math.PI / 8; 
            scene.add(seesawBoard);
            walkableObjects.push(seesawBoard);

            windowMesh = createStylizedMesh(new THREE.BoxGeometry(3, 2, 0.1), 0x60a5fa, true, 0.4);
            // 창문의 y축 높이를 올려 평지에서 손이 닿지 않도록 수정
            windowMesh.position.set(9.7, 7.5, 5.5); 
            windowMesh.rotation.y = -Math.PI / 2;
            windowMesh.userData = { name: '창문', originalStaticProperty: '투명함', staticProperty: '투명함', canHold: false };
            scene.add(windowMesh);
            interactableObjects.push(windowMesh);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            window.addEventListener('resize', onWindowResize);
            
            updateHandVisual(); 
            updateHUD(); // 초기화 시에도 HUD 텍스트 상태를 반영하도록 추가
        }

        function updateKeypadDisplay() {
            document.getElementById('keypad-display').innerText = currentInput;
        }

        function inputKey(num) {
            if (currentInput.length < 4 && currentInput !== "OPEN" && currentInput !== "CLOSE") {
                currentInput += num;
                updateKeypadDisplay();
                
                if (currentInput.length === 4) {
                    setTimeout(checkPassword, 300);
                }
            }
        }

        function checkPassword() {
            const display = document.getElementById('keypad-display');
            if (currentInput === "1234") {
                display.innerText = "OPEN";
                display.style.color = "#4ade80";
                isDoorOpen = true;
                setTimeout(() => {
                    document.getElementById('keypad-ui').style.display = 'none';
                    document.getElementById('success-ui').style.display = 'flex';
                    if(document.pointerLockElement) document.exitPointerLock();
                }, 1000);
            } else {
                display.innerText = "CLOSE";
                display.style.color = "#ef4444";
                setTimeout(() => {
                    currentInput = "";
                    display.style.color = "#4ade80";
                    updateKeypadDisplay();
                }, 1000);
            }
        }

        function closeKeypad() {
            document.getElementById('keypad-ui').style.display = 'none';
            controls.lock();
        }

        function setStance(newStance) {
            stance = newStance;
            const ui = document.getElementById('stance-ui');
            if (stance === 'crouch') { targetCameraHeight = 1.0; ui.innerText = "자세: 앉기"; }
            else if (stance === 'prone') { targetCameraHeight = 0.5; ui.innerText = "자세: 엎드리기"; }
            else { targetCameraHeight = 1.6; ui.innerText = "자세: 서있기"; }
        }

        function showNotification(msg, duration = 4000) {
            const noti = document.getElementById('notification');
            noti.innerText = msg;
            noti.style.display = 'block';
            if(noti.timeoutId) clearTimeout(noti.timeoutId);
            noti.timeoutId = setTimeout(() => { noti.style.display = 'none'; }, duration);
        }

        function handleEKey() {
            if (!controls.isLocked) return;
            if (heldObject) {
                camera.remove(heldObject);
                scene.add(heldObject);
                const dropPos = new THREE.Vector3();
                camera.getWorldDirection(dropPos);
                dropPos.y = 0; 
                dropPos.normalize().multiplyScalar(2.0); 
                dropPos.add(camera.position);
                
                heldObject.position.set(dropPos.x, camera.position.y, dropPos.z);
                heldObject.rotation.set(0, 0, 0); 
                
                showNotification(`[${heldObject.userData.name}]을(를) 내려놓았습니다.`);
                heldObject = null;
                leftHandMesh.visible = true;
                rightHandMesh.visible = true;
            } else {
                raycaster.setFromCamera(screenCenter, camera);
                const intersects = raycaster.intersectObjects(interactableObjects);
                if (intersects.length > 0 && intersects[0].distance <= interactDistance) {
                    const target = intersects[0].object;
                    if (target.userData.canHold) {
                        if (target.userData.staticProperty !== '가벼움') {
                            showNotification(`[${target.userData.name}]이(가) 무거워서 들 수 없습니다.`);
                            return;
                        }
                        heldObject = target;
                        scene.remove(heldObject);
                        camera.add(heldObject);
                        heldObject.position.set(0, -0.6, -1.5); 
                        heldObject.rotation.set(0, 0, 0);
                        showNotification(`[${heldObject.userData.name}]을(를) 집었습니다.`);
                        leftHandMesh.visible = false;
                        rightHandMesh.visible = false;
                    }
                }
            }
        }

        function handleFKey() {
            if (!controls.isLocked || !heldObject) return;
            const obj = heldObject;
            heldObject = null;
            camera.remove(obj);
            scene.add(obj);
            const startPos = new THREE.Vector3();
            camera.getWorldPosition(startPos);
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            startPos.addScaledVector(dir, 1.5); 
            obj.position.copy(startPos);
            const throwVelocity = dir.clone().multiplyScalar(15); 
            throwVelocity.y += 5; 
            thrownObjects.push({ mesh: obj, velocity: throwVelocity });
            leftHandMesh.visible = true;
            rightHandMesh.visible = true;
        }

        function onMouseClick(event) {
            if (!controls.isLocked || heldObject) return; 
            raycaster.setFromCamera(screenCenter, camera);
            
            const intersects = raycaster.intersectObjects(interactableObjects);

            if (intersects.length > 0) {
                if (intersects[0].distance > interactDistance) {
                    showNotification("너무 멉니다.");
                    return;
                }
                const targetObject = intersects[0].object;
                
                if (targetObject.userData.isDoor) {
                    if (!isDoorOpen) {
                        controls.unlock();
                        document.getElementById('keypad-ui').style.display = 'block';
                        currentInput = "";
                        updateKeypadDisplay();
                    } else {
                        showNotification("문이 이미 열려 있습니다.");
                    }
                    return;
                }
                
                if (event.button === 0) {
                    leftHandMesh.position.z -= 0.3; 
                    processInteraction(targetObject, 'static');
                } else if (event.button === 2) {
                    rightHandMesh.position.z -= 0.3;
                    processInteraction(targetObject, 'dynamic');
                }
            }
        }

        function processInteraction(object, propertyType) {
            const isStatic = (propertyType === 'static');
            const handProp = isStatic ? leftHandProperty : rightHandProperty;
            const objPropKey = isStatic ? 'staticProperty' : 'dynamicProperty';
            const originalPropKey = isStatic ? 'originalStaticProperty' : 'originalDynamicProperty';
            
            if (handProp === null) {
                const propToExtract = object.userData[objPropKey];
                if (propToExtract) { 
                    if (isStatic) leftHandProperty = propToExtract;
                    else rightHandProperty = propToExtract;
                    showNotification(`[추출] ${object.userData.name}에서 '${propToExtract}' 획득`);
                }
            } else {
                const injectedProp = handProp;
                object.userData[objPropKey] = injectedProp;
                showNotification(`[주입] ${object.userData.name}에 '${injectedProp}' 주입 됨`);
                updateObjectVisual(object, injectedProp);

                if (isStatic) leftHandProperty = null;
                else rightHandProperty = null;

                if (object.userData.restoreTimeout) clearTimeout(object.userData.restoreTimeout);
                object.userData.restoreTimeout = setTimeout(() => {
                    const originalProp = object.userData[originalPropKey];
                    object.userData[objPropKey] = originalProp;
                    updateObjectVisual(object, originalProp); 
                    showNotification(`[복구] ${object.userData.name}의 내부 성질이 '${originalProp}'(으)로 돌아왔습니다.`);
                }, 10000);
            }
            updateHUD();
            updateHandVisual(); 
        }

        function updateObjectVisual(object, prop) {
            if (prop === '투명함') {
                object.material.color.setHex(object.userData.name === '금고' ? 0x88929e : 0x60a5fa); 
                object.material.transparent = true;
                object.material.opacity = 0.3;          
            } else if (prop === '무거움') {
                object.material.color.setHex(0x374151); 
                object.material.transparent = false;
                object.material.opacity = 1.0;          
            } else if (prop === '가벼움') {
                object.material.color.setHex(0xcfa87e); 
                object.material.transparent = false;
                object.material.opacity = 1.0; 
            }
        }

        function updateHandVisual() {
            if (leftHandProperty === '투명함') {
                leftHandMesh.material.color.setHex(0x60a5fa);
                leftHandMesh.material.transparent = true;
                leftHandMesh.material.opacity = 0.5;
            } else if (leftHandProperty === '무거움') {
                leftHandMesh.material.color.setHex(0x374151);
                leftHandMesh.material.transparent = false;
                leftHandMesh.material.opacity = 1.0;
            } else {
                leftHandMesh.material.color.setHex(0x555555);
                leftHandMesh.material.transparent = true;
                leftHandMesh.material.opacity = 0.3;
            }

            if (rightHandProperty === '동력') {
                rightHandMesh.material.color.setHex(0xfacc15); 
                rightHandMesh.material.transparent = false;
                rightHandMesh.material.opacity = 1.0;
            } else {
                rightHandMesh.material.color.setHex(0x555555);
                rightHandMesh.material.transparent = true;
                rightHandMesh.material.opacity = 0.3;
            }
        }

        // 누락되었던 UI 업데이트 함수 추가
        function updateHUD() {
            document.getElementById('left-hand').innerText = leftHandProperty || "비어있음";
            document.getElementById('right-hand').innerText = rightHandProperty || "비어있음";
            document.getElementById('left-hand').style.color = leftHandProperty ? "#f87171" : "#4ade80";
            document.getElementById('right-hand').style.color = rightHandProperty ? "#60a5fa" : "#4ade80";
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();

            if (controls.isLocked === true) {
                const delta = (time - prevTime) / 1000;
                const playerObj = controls.getObject();

                leftHandMesh.position.z += (handRestZ - leftHandMesh.position.z) * 8 * delta;
                rightHandMesh.position.z += (handRestZ - rightHandMesh.position.z) * 8 * delta;

                downRaycaster.set(playerObj.position, new THREE.Vector3(0, -1, 0));
                const validWalkables = walkableObjects.filter(obj => obj !== heldObject);
                const intersectsDown = downRaycaster.intersectObjects(validWalkables);
                
                let floorY = 0;
                let onObject = null;
                if (intersectsDown.length > 0) {
                    floorY = intersectsDown[0].point.y;
                    onObject = intersectsDown[0].object;
                }

                velocity.y -= gravity * delta; 
                playerObj.position.y += velocity.y * delta;

                if (playerObj.position.y <= floorY + targetCameraHeight) {
                    velocity.y = Math.max(0, velocity.y); 
                    playerObj.position.y = floorY + targetCameraHeight;
                    canJump = true;
                }

                let speedMultiplier = 40.0; 
                if (isRunning && stance === 'stand') speedMultiplier = 80.0; 
                if (stance === 'crouch') speedMultiplier = 20.0; 
                if (stance === 'prone') speedMultiplier = 10.0; 

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * speedMultiplier * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speedMultiplier * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // --- 1. 방 경계 제한 ---
                const px = playerObj.position.x;
                const pz = playerObj.position.z;

                if (px > roomBound) playerObj.position.x = roomBound;
                if (px < -roomBound) playerObj.position.x = -roomBound;
                if (pz > roomBound) playerObj.position.z = roomBound;
                if (!isDoorOpen && pz < -roomBound) playerObj.position.z = -roomBound;

                for (let obj of interactableObjects) {
                    if (obj.userData.canHold && obj !== heldObject) {
                        if (obj.position.x > roomBound) obj.position.x = roomBound;
                        if (obj.position.x < -roomBound) obj.position.x = -roomBound;
                        if (obj.position.z > roomBound) obj.position.z = roomBound;
                        if (!isDoorOpen && obj.position.z < -roomBound) obj.position.z = -roomBound;
                    }
                }

                // --- 2. 시소 무게 실시간 연산 ---
                let seesawWeightZ = 0; 
                
                if (onObject === seesawBoard && floorY > 0.5) {
                    seesawWeightZ += (pz - 2) * 2; 
                }

                if (paperBox !== heldObject && paperBox.position.x > 7.3 && paperBox.position.x < 8.7 && paperBox.position.z > -2 && paperBox.position.z < 6 && paperBox.position.y > 0.5) {
                    let boxWeight = (paperBox.userData.staticProperty === '무거움') ? 2 : 0.5;
                    seesawWeightZ += (paperBox.position.z - 2) * boxWeight;
                }

                let targetRot = Math.PI / 8; 
                if (seesawWeightZ > 0.5) targetRot = Math.PI / 8;
                else if (seesawWeightZ < -0.5) targetRot = -Math.PI / 8;
                else if (seesawWeightZ === 0) targetRot = Math.PI / 8; 

                seesawBoard.rotation.x += (targetRot - seesawBoard.rotation.x) * 5 * delta;

                // --- 3. 던진 물건 로직 ---
                for (let i = thrownObjects.length - 1; i >= 0; i--) {
                    const tObj = thrownObjects[i];
                    tObj.velocity.y -= gravity * delta; 
                    
                    const nextPos = tObj.mesh.position.clone().addScaledVector(tObj.velocity, delta);
                    
                    const objHeight = tObj.mesh.geometry.parameters ? tObj.mesh.geometry.parameters.height : 1.0;
                    const rayOrigin = nextPos.clone();
                    rayOrigin.y += 3.0; // 오브젝트 위쪽에서 아래로 광선 발사
                    downRaycaster.set(rayOrigin, new THREE.Vector3(0, -1, 0));
                    
                    const validWalkablesObj = walkableObjects.filter(w => w !== tObj.mesh);
                    const intersects = downRaycaster.intersectObjects(validWalkablesObj);
                    
                    let targetY = objHeight / 2;
                    if (intersects.length > 0) {
                        targetY = intersects[0].point.y + objHeight / 2;
                    }
                    
                    if (nextPos.y <= targetY) {
                        tObj.mesh.position.y = targetY;
                        tObj.mesh.position.x = nextPos.x;
                        tObj.mesh.position.z = nextPos.z;
                        thrownObjects.splice(i, 1); // 바닥 안착 후 물리 계산 루프로 이관
                    } else {
                        tObj.mesh.position.copy(nextPos);
                    }
                }

                // --- 4. 드랍/안착된 오브젝트 실시간 물리 추적 로직 (시소 연동) ---
                const validPhysicsObjects = interactableObjects.filter(obj => obj.userData.canHold);
                validPhysicsObjects.forEach(obj => {
                    if (obj === heldObject || thrownObjects.some(t => t.mesh === obj)) return;
                    
                    const objHeight = obj.geometry.parameters ? obj.geometry.parameters.height : 1.0;
                    const rayOrigin = obj.position.clone();
                    rayOrigin.y += 3.0; 
                    downRaycaster.set(rayOrigin, new THREE.Vector3(0, -1, 0));
                    
                    const validWalkablesObj = walkableObjects.filter(w => w !== obj);
                    const intersects = downRaycaster.intersectObjects(validWalkablesObj);
                    
                    let targetY = objHeight / 2;
                    let isOnSeesaw = false;
                    if (intersects.length > 0) {
                        targetY = intersects[0].point.y + objHeight / 2;
                        if (intersects[0].object === seesawBoard) isOnSeesaw = true;
                    }

                    // 부드러운 낙하 및 표면 밀착
                    if (obj.position.y > targetY + 0.1) {
                        obj.position.y -= gravity * delta; 
                        if (obj.position.y < targetY) obj.position.y = targetY;
                    } else {
                        obj.position.y = targetY; 
                    }

                    // 시소 위에 있을 경우 기울기 적용
                    if (isOnSeesaw) {
                        obj.rotation.x = seesawBoard.rotation.x;
                    } else {
                        obj.rotation.x += (0 - obj.rotation.x) * 10 * delta; 
                    }
                });

            }
            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
